<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Atelier - Physics Solutions</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="script.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body class="bg-background text-on-background selection:bg-primary-container selection:text-on-primary-container">
<!-- SideNavBar (Unified) -->
<aside class="bg-[#f1f4f6] dark:bg-[#1a1f24] font-manrope tracking-tight leading-relaxed h-screen w-64 fixed left-0 top-0 overflow-y-auto z-50 hidden lg:flex flex-col py-12 border-r border-surface-container-highest/20">
<div class="px-8 mb-12">
<h1 class="text-xl font-light tracking-[0.2em] uppercase text-[#2b3437] dark:text-[#f8f9fa]">Atelier</h1>
<p class="text-xs text-on-surface-variant tracking-widest mt-1 opacity-70">Physics Hub</p>
</div>
<nav class="flex-1 flex flex-col gap-1 px-2">
<a class="flex items-center gap-4 px-6 py-4 text-[#586064] dark:text-[#abb3b7] hover:bg-[#ffffff]/50 dark:hover:bg-[#2b3437]/50 transition-all duration-300 scale-100 active:scale-[0.99] rounded-xl" href="dashboard.html">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="text-sm font-medium">Dashboard</span>
</a>
<a class="flex items-center gap-4 px-6 py-4 text-[#586064] dark:text-[#abb3b7] hover:bg-[#ffffff]/50 dark:hover:bg-[#2b3437]/50 transition-all duration-300 scale-100 active:scale-[0.99] rounded-xl" href="video_lessons.html">
<span class="material-symbols-outlined" data-icon="school">school</span>
<span class="text-sm font-medium">Video Lessons</span>
</a>
<a class="flex items-center gap-4 px-6 py-4 text-[#586064] dark:text-[#abb3b7] hover:bg-[#ffffff]/50 dark:hover:bg-[#2b3437]/50 transition-all duration-300 scale-100 active:scale-[0.99] rounded-xl" href="past_papers.html">
<span class="material-symbols-outlined" data-icon="archive">archive</span>
<span class="text-sm font-medium">Past Papers</span>
</a>
</nav>
</aside>
<!-- TopAppBar Shell -->
<header class="fixed top-0 right-0 w-full lg:w-[calc(100%-16rem)] h-20 z-40 bg-[#f8f9fa]/80 dark:bg-[#0d1117]/80 backdrop-blur-xl flex justify-between items-center px-6 lg:px-12 transition-all border-b border-surface-container-highest/10">
<div class="flex items-center gap-3 lg:gap-6">
<span class="text-[0.6rem] lg:text-xs uppercase tracking-[0.3em] text-on-surface-variant font-bold opacity-60 hidden sm:inline">IGCSE Revision</span>
<div class="h-4 w-px bg-outline-variant opacity-20 hidden sm:block"></div>
<span id="top-subtitle" class="text-xs lg:text-sm font-bold text-on-surface truncate max-w-[150px] lg:max-w-none">Loading Series...</span>
</div>
<div class="flex items-center gap-3 lg:gap-8" id="header-actions">
</div>
</header>
<!-- Main Content Canvas -->
<main class="ml-0 lg:ml-64 pt-20 min-h-screen bg-background">
<div class="max-w-6xl mx-auto px-6 lg:px-12 py-12 lg:py-16">
                <!-- Hero Video Player Section -->
                <section class="mb-12 lg:mb-20">
                    <div id="player-wrapper" class="relative aspect-video rounded-3xl lg:rounded-[2rem] overflow-hidden bg-[#0d1117] shadow-xl flex items-center justify-center">
                        <video id="main-video" class="w-full h-full" controls crossorigin="anonymous" playsinline></video>
                    </div>
                    <div class="mt-4 flex justify-end">
                        <span id="time-duration" class="text-[0.65rem] font-bold tracking-widest text-on-surface-variant uppercase bg-surface-container px-3 py-1 rounded-full">0:00</span>
                    </div>
                </section>
<!-- Lesson Details Grid -->
<div class="grid grid-cols-12 gap-8 lg:gap-12 items-start">
<!-- Left Content -->
<div class="col-span-12 lg:col-span-7">
<div class="mb-2">
<span class="text-[0.6rem] lg:text-[0.65rem] uppercase tracking-[0.4em] font-bold text-primary">Paper Solution</span>
</div>
<h2 id="lesson-title" class="text-3xl lg:text-5xl font-bold tracking-tight text-on-surface mb-6 leading-tight">Loading...</h2>
<p id="lesson-desc" class="text-base lg:text-lg leading-relaxed text-on-surface-variant font-light max-w-prose opacity-80">Please wait.</p>
</div>
<!-- Right Content -->
<div id="lesson-sidebar" class="col-span-12 lg:col-span-5 flex flex-col gap-12 lg:pl-12 lg:border-l lg:border-surface-container-highest/30">
</div>
</div>
<!-- Focus Bottom Sheet -->
<div class="mt-20 lg:mt-32 p-8 lg:p-12 rounded-3xl bg-surface-container-low/50 flex flex-col items-center text-center border border-surface-container-highest/20">
<span class="material-symbols-outlined text-outline-variant/20 text-5xl mb-4" data-icon="science">science</span>
<p class="text-xs lg:text-sm text-on-surface-variant font-bold max-w-sm uppercase tracking-widest opacity-40">
                A* Physics Mastery Tracking
            </p>
</div>
</div>
</main>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-5%] w-[40%] h-[60%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[20%] w-[30%] h-[50%] rounded-full bg-secondary/5 blur-[100px]"></div>
</div>
</body></html>
