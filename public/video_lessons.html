<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Elementa | Video Lessons</title>
<link rel="icon" type="image/png" href="logo.png">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="script.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body class="bg-background text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- SideNavBar (Unified) -->
<aside class="bg-[#f1f4f6] dark:bg-[#1a1f24] font-manrope tracking-tight leading-relaxed h-screen w-64 fixed left-0 top-0 overflow-y-auto z-50 hidden lg:flex flex-col py-12 border-r border-surface-container-highest/20">
<div class="px-8 mb-12">
<h1 class="text-xl font-light tracking-[0.2em] uppercase text-[#2b3437] dark:text-[#f8f9fa]">Elementa</h1>
<p class="text-xs text-on-surface-variant tracking-widest mt-1 opacity-70">Learning Hub</p>
</div>
<nav class="flex-1 flex flex-col gap-1 px-2">
<a class="flex items-center gap-4 px-6 py-4 text-[#586064] dark:text-[#abb3b7] hover:bg-[#ffffff]/50 dark:hover:bg-[#2b3437]/50 transition-all duration-300 scale-100 active:scale-[0.99] rounded-xl" href="dashboard.html">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="text-sm font-medium">Dashboard</span>
</a>
<a class="flex items-center gap-4 px-6 py-4 text-[#586064] dark:text-[#abb3b7] hover:bg-[#ffffff]/50 dark:hover:bg-[#2b3437]/50 transition-all duration-300 scale-100 active:scale-[0.99] rounded-xl" href="video_lessons.html">
<span class="material-symbols-outlined" data-icon="school">school</span>
<span class="text-sm font-medium">Video Lessons</span>
</a>
<a class="flex items-center gap-4 px-6 py-4 text-[#586064] dark:text-[#abb3b7] hover:bg-[#ffffff]/50 dark:hover:bg-[#2b3437]/50 transition-all duration-300 scale-100 active:scale-[0.99] rounded-xl" href="past_papers.html">
<span class="material-symbols-outlined" data-icon="archive">archive</span>
<span class="text-sm font-medium">Past Papers</span>
</a>
</nav>
</aside>
<!-- TopAppBar Anchor -->
<header class="bg-[#f8f9fa]/80 dark:bg-[#0d1117]/80 backdrop-blur-xl fixed top-0 right-0 w-full lg:w-[calc(100%-16rem)] h-20 z-40 flex justify-between items-center px-6 lg:px-12 tonal-shift border-b border-surface-container-highest/10">
<div class="flex items-center gap-4">
    <span id="header-subject-label" class="font-manrope font-medium text-[0.7rem] lg:text-sm text-[#586064] dark:text-[#abb3b7] opacity-60 uppercase tracking-widest">Library / Edexcel IGCSE Portal</span>
</div>
<div class="flex items-center gap-3 lg:gap-8" id="header-actions">
</div>
</header>
<!-- Main Content Canvas -->
<main class="ml-0 lg:ml-64 pt-20 min-h-screen pb-24">
<div class="max-w-6xl mx-auto px-6 lg:px-12 py-12 lg:py-16">
<!-- Hero Header: Editorial Style -->
<header class="mb-12 lg:mb-24 flex flex-col lg:flex-row lg:items-end justify-between gap-8">
<div class="max-w-2xl">
<h2 class="text-4xl lg:text-[3.5rem] font-bold leading-[1.1] tracking-tight text-on-surface mb-6">Video Lessons</h2>
<p class="text-on-surface-variant text-base lg:text-lg font-light leading-relaxed opacity-80">
    A curated sanctuary of Edexcel IGCSE video tutorials. Structured review sessions focusing on core principles and exam technique.
</p>
</div>
<div class="flex flex-col sm:flex-row sm:items-center gap-4">
    <div class="relative w-full sm:w-auto">
        <select id="sort-filter" class="w-full sm:w-auto appearance-none bg-surface-container border border-outline/30 text-on-surface text-sm font-semibold tracking-wider rounded-full px-6 py-2.5 pr-10 focus:outline-none focus:ring-2 focus:ring-primary cursor-pointer hover:bg-surface-container-high transition-colors">
            <option value="date_desc" selected>Date: Newest First</option>
            <option value="date_asc">Date: Oldest First</option>
            <option value="history_asc">History: Earliest Watched First</option>
        </select>
        <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant text-sm">expand_more</span>
    </div>
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant opacity-60" id="records-counter">Loading...</span>
</div>
</header>
<!-- Solutions Grid -->
<div id="lessons-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
<!-- Cards will be dynamically injected here via script.js -->
</div>
</section>
<!-- Pagination/Footer Area -->
<footer class="hidden lg:flex mt-8 lg:mt-12 pt-8 flex-col sm:flex-row items-center gap-8 justify-between border-t border-surface-container-highest/20">
    <button id="prev-page" class="flex items-center gap-2 text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
        <span class="material-symbols-outlined text-sm">arrow_back</span> Back
    </button>
    <div id="pagination-dots" class="flex gap-4 items-center">
        <span id="page-info" class="text-[0.65rem] font-bold uppercase tracking-[0.2em] text-on-surface-variant opacity-60">Page 1 of 1</span>
    </div>
    <button id="next-page" class="flex items-center gap-2 text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
        Next <span class="material-symbols-outlined text-sm">arrow_forward</span>
    </button>
</footer>
</div>
</main>
<!-- Focus Layer Gradient (Subtle depth) -->
<div class="fixed bottom-0 left-0 lg:left-64 right-0 h-32 bg-gradient-to-t from-background to-transparent pointer-events-none z-10"></div>
</body></html>
